<div class="card">
    <div class="card-header">
        <h3>
            Máscaras
        </h3>
    </div>

    <div class="card-body">
        <h5 class="card-title">
            EXEMPLOS
        </h5>

        <p class="card-text">
            <b>
                Data:
            </b>  
                {$date} 
            <br>
            <b>
                Hora:
            </b>
                {$datetime}
            <br>
            <b>
                Número:
            </b>
                {$number}
            <br>
            <b>
                Valores:
            </b>
                {$value1}, {$value2}, {$value3}
            <br>
            <b>
                Avaliar:
            </b>
                {$evaluate}
            <br>
        </p>
    </div>
</div>
